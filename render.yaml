services:
  - type: web
    name: beat-mp3-back
    env: python
    rootDir: back-converter
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/system/health
    envVars:
      - key: BACKEND_APP_NAME
        value: Beat MP3 Converter API
      - key: BACKEND_RUNTIME_MODE
        value: production
      - key: BACKEND_CORS_ORIGINS
        value: https://beat-mp3-converter.vercel.app
      - key: BACKEND_CORS_ALLOW_CREDENTIALS
        value: "true"
      - key: BACKEND_JOBS_DB_PATH
        value: /tmp/jobs.db
      - key: BACKEND_WORKER_MAX_WORKERS
        value: "2"
      - key: BACKEND_YTDLP_COOKIES_ENABLED
        value: "false"
      - key: BACKEND_YTDLP_COOKIES_FILE
        value: /etc/secrets/youtube_cookies.txt
